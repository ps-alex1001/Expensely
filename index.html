<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style/style.css" />
        <title>Expensely</title>
    </head>
    <body>
        <header>
            <h1>
                <em><strong>X</strong>pnsly</em>
            </h1>
            <h2>Your Expenses tracking made easy.</h2>
            <hr />
        </header>
        <main>
            <section class="dashboard">
                <figure class="data-figure">
                    <h2>Total Expenses</h2>
                    <h1 id="stat-total">$0.00</h1>
                    <h3>Last 30 days</h3>
                </figure>
                <figure class="data-figure">
                    <h2>Daily Average</h2>
                    <h1 id="stat-average">$0.00</h1>
                    <h3>Based on 30 days</h3>
                </figure>
                <figure class="data-figure">
                    <h2>Categories</h2>
                    <h1 id="stat-categories">0</h1>
                    <h3>Different types</h3>
                </figure>
            </section>
            <section class="second-section">
                <aside class="add-expense">
                    <h1>
                        <i class="fa-solid fa-circle-plus"></i> Add New Expense
                    </h1>
                    <form action="" class="form">
                        <div class="form-group-full">
                            <label for="category">Category</label>
                            <!-- category dropdown -->
                            <select id="category" name="category">
                                <option value="" disabled selected>
                                    Select a category
                                </option>
                                <option value="1">Food</option>
                                <option value="2">
                                    Shopping
                                </option>
                                <option value="3">Housing</option>
                                <option value="4">
                                    Transportation
                                </option>
                                <option value="5">Life & Entertainment</option>
                                <option value="6">Others</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group-half">
                                <label for="amount">Amount (₱)</label>
                                <input
                                    type="number"
                                    id="amount"
                                    placeholder="0.00"
                                    step="0.01" />
                            </div>
                            
                            <div class="form-group-half">
                                <label for="date">Date</label>
                                <input type="date" id="date" />
                            </div>
                        </div>

                        <div class="form-group-full">
                            <label for="notes">Notes</label>
                            <input
                                type="text"
                                id="notes"
                                placeholder="Any additional notes?" />
                        </div>

                        <div class="form-action">
                            <button type="button" class="btn-submit" onclick="insertRecord()">
                                Add Expense
                            </button>
                        </div>
                    </form>
                </aside>
                <aside class="expense-list">
                    <h1><i class="fa-solid fa-list"></i> Expense List</h1>
                    <table>
                        <thead>
                            <tr>
                                <th colspan="1">#</th>
                                <th colspan="1">Category</th>
                                <th colspan="1">Amount (₱)</th>
                                <th colspan="1">Date</th>
                                <th colspan="1">Notes</th>
                                <th colspan="1">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="expense-table-body">
                            <!-- <td colspan="1">1</td>
                            <td colspan="1">Food</td>
                            <td colspan="1">$15.00</td>
                            <td colspan="1">2023-10-01</td>
                            <td colspan="1">Lunch at restaurant</td>
                            <td colspan="1">
                                <button class="btn-edit">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button class="btn-delete">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td> -->

                        </tbody>
                    </table>
                    <div id="edit-panel" class="edit-panel-hidden">
                        <h3>
                            <i class="fa-solid fa-pen-to-square"></i> Edit
                            Expense #<span id="edit-id-label"></span>
                        </h3>

                        <input type="hidden" id="edit-id" />

                        <div class="form-group-full">
                            <label for="edit-category">Category</label>
                            <select id="edit-category">
                                <option value="food">Food</option>
                                <option value="transportation">
                                    Transportation
                                </option>
                                <option value="utilities">Utilities</option>
                                <option value="entertainment">
                                    Entertainment
                                </option>
                                <option value="shopping">Shopping</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-row edit-panel-row">
                            <div class="form-group-half">
                                <label for="edit-amount">Amount (₱)</label>
                                <input
                                    type="number"
                                    id="edit-amount"
                                    step="0.01" />
                            </div>
                            <div class="form-group-half">
                                <label for="edit-date">Date</label>
                                <input type="date" id="edit-date" />
                            </div>
                        </div>

                        <div class="form-group-full">
                            <label for="edit-notes">Notes</label>
                            <input type="text" id="edit-notes" />
                        </div>

                        <div class="edit-panel-actions">
                            <button
                                type="button"
                                class="btn-submit"
                                onclick="saveRecord()">
                                Save Changes
                            </button>
                            <button
                                type="button"
                                class="btn-cancel"
                                onclick="cancelEdit()">
                                Cancel
                            </button>
                        </div>
                    </div>
                </aside>
            </section>
        </main>
        <footer>
            <hr />
            <br /><br />Made with ❤️ by Hexo
        </footer>
        <script
            src="https://kit.fontawesome.com/8ec3ed8fc2.js"
            crossorigin="anonymous"></script>
        <script src="script/jquery-4.0.0.min.js"></script>
        <script src="script/script.js"></script>
    </body>
</html>
