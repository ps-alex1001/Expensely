<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h2>Sample CRUD</h2>

    <div class="container">
        <div class="row">
            <div class="col-lg-auto">
                <table class="table table-bordered">
                    <thead>
                        <th>Student no.</th>
                        <th>Full Name</th>
                        <th>College</th>
                        <th>Program</th>
                        <th>Actions</th>
                    </thead>

                    <tbody id="studentData">

                    </tbody>
                </table>
            </div>

            <div class="col-md-6">
                <div class="mb-1">
                    <label for="studno" class="form-label">Student Number: </label>
                    <input type="text" class="form-control" id="studno" placeholder="Student Number">
                </div>
                <div class="mb-1">
                    <label for="fname" class="form-label">First Name: </label>
                    <input type="text" class="form-control" id="fname" placeholder="First Name">
                </div>
                <div class="mb-1">
                    <label for="lname" class="form-label">Last Name: </label>
                    <input type="text" class="form-control" id="lname" placeholder="Last Name">
                </div>
                <div class="mb-1">
                    <label for="sex" class="form-label">Sex at Birth: </label>
                    <select class="form-select" id="sex" aria-label="Default select example">
                        <option selected hidden>Select Sex</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>
                <div class="mb-1">
                    <label for="college" class="form-label">College: </label>
                    <input type="text" class="form-control" id="college" placeholder="College">
                </div>
                <div class="mb-1">
                    <label for="program" class="form-label">Program: </label>
                    <input type="text" class="form-control" id="program" placeholder="Program">
                </div>
                <!-- <div class="mb-1">
                    <label for="extname" class="form-label">Extra Name: </label>
                    <select class="form-select" id="extname" aria-label="Default select example">
                        <option selected hidden>Select ExtName</option>
                        <option>N/A</option>
                        <option value="Sr">Sr</option>
                        <option value="Jr">Jr</option>
                        <option value="I">I</option>
                        <option value="II">II</option>
                        <option value="III">III</option>
                    </select>
                </div> -->
                
                <button type="button" class="btn btn-success" onclick="addStudent()">Add</button>

            </div>
        </div>
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
    <script src="script/jquery-4.0.0.min.js"></script>
    <script src="script/crud.js"></script>
</body>
</html>
